<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <button id="themeToggle">
            🌙 Dark Mode
        </button>

        <h1>AI Interview Trainer</h1>

        <div class="input-row">

            <select id="role">
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Java Developer">Java Developer</option>
                <option value="Python Developer">Python Developer</option>
                <option value="HR Interview">HR Interview</option>
            </select>

            <select id="difficulty">
                <option value="Easy">Easy</option>
                <option value="Medium" selected>Medium</option>
                <option value="Hard">Hard</option>
            </select>

            <button id="generateBtn">
                Generate Question
            </button>

            <button id="nextQuestionBtn">
                Next Question
            </button>

        </div>

        <div id="questionBox">
            Question will appear here...
        </div>

        <textarea
            id="answerInput"
            placeholder="Type your answer here..."
            rows="8">
        </textarea>

        <button id="evaluateBtn">
            Evaluate Answer
        </button>

        <button id="downloadPdfBtn">
            Download Report
        </button>
        <div id="resultBox">
            Evaluation will appear here...
        </div>

        <hr>

        <section class="dashboard-section">

            <h2>Statistics</h2>

            <div id="statsBox">
                <p>Total Interviews: <span id="totalInterviews">0</span></p>
                <p>Average Score: <span id="averageScore">0</span>/10</p>
            </div>

        </section>

        <hr>

        <section class="history-section">

            <div class="history-header">
                <h2>Interview History</h2>
                <button id="clearHistoryBtn">
                    Clear History
                </button>
            </div>

            <div id="historyBox">
                No history yet.
            </div>

        </section>

    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
