<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>AI Interview Trainer</h1>

        <select id="role">
            <option value="Frontend Developer">Frontend Developer</option>
            <option value="Backend Developer">Backend Developer</option>
            <option value="Java Developer">Java Developer</option>
            <option value="Python Developer">Python Developer</option>
            <option value="HR Interview">HR Interview</option>
        </select>

        <button id="generateBtn">Generate Question</button>

        <div id="questionBox">
            Question will appear here...
        </div>

        <textarea id="answerInput" placeholder="Type your answer here..."></textarea>

        <button id="evaluateBtn">Evaluate Answer</button>

        <div id="resultBox">
            Evaluation will appear here...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
